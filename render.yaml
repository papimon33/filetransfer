# Render 배포용 Blueprint.  Render 대시보드 > New > Blueprint 에서 이 리포를 선택하면 됩니다.
# ⚠️ 조직 보안정책 확인 필수: 업무 사진이 외부 클라우드를 경유합니다. 사내 서버 배포를 권장.
services:
  - type: web
    name: qr-upload-server
    runtime: python
    plan: free                         # 유료 플랜에서만 아래 disk(영구 저장) 사용 가능
    rootDir: .                         # 이 리포 루트가 곧 앱 폴더(qr-upload-server를 그대로 push한 경우)
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BASE_URL                  # 배포 후 https://<앱>.onrender.com 로 채우세요(대시보드에서 입력)
        sync: false
      - key: MONGODB_URI               # ★ MongoDB Atlas 연결문자열(<db_password> 채워서 대시보드에 입력) — 토큰 영구저장
        sync: false
      - key: MONGODB_DB
        value: filetransfer
      - key: ENROLL_KEY                # (선택) 사번 자가발급에 가입코드 요구. 비우면 사번만으로 발급.
        sync: false
      - key: PRESET_TOKENS             # (선택) 기존 토큰 마이그레이션용 "토큰=이름". Mongo 쓰면 대개 불필요
        sync: false
      - key: MAX_FILE_MB
        value: "30"
      - key: RETENTION_HOURS
        value: "6"
      - key: CLEANUP_INTERVAL_MIN
        value: "30"
      - key: ALLOWED_EXT
        value: "jpg,jpeg,png,heic,heif,webp,gif,bmp,tif,tiff,pdf,hwp,hwpx,doc,docx,xls,xlsx,ppt,pptx,txt,csv,zip"
      - key: REQUIRE_PIN
        value: "false"
      - key: ADMIN_PASSWORD            # 관리 콘솔 로그인 비밀번호 — 기억하기 쉬운 값으로 대시보드에서 직접 입력
        sync: false
      - key: ADMIN_KEY                 # (미설정 시 로그인 비밀번호로도 사용) 자동 생성
        generateValue: true
      - key: SESSION_SECRET            # 자동 생성(고정) → PIN 세션이 재배포 후에도 유지
        generateValue: true
      # 기본: 디스크 없이(무료 플랜) 프로젝트 폴더 아래에 저장 → 쓰기 가능.
      # 파일시스템은 임시(재배포/슬립 시 초기화)이지만, 토큰은 PRESET_TOKENS 로 유지됨.
      - key: UPLOAD_DIR
        value: uploads
      - key: TOKENS_FILE
        value: tokens.json
      - key: QR_DIR
        value: qrcodes
    # ↓ 영구 저장(유료 Disk)을 원하면 아래 disk 주석을 풀고,
    #   위 UPLOAD_DIR/TOKENS_FILE/QR_DIR 값을 /data/uploads · /data/tokens.json · /data/qrcodes 로 함께 바꾸세요.
    #   (디스크 없이 /data 를 지정하면 부팅 크래시가 납니다.)
    # disk:
    #   name: data
    #   mountPath: /data
    #   sizeGB: 1
