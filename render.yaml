# Render 배포용 Blueprint.  Render 대시보드 > New > Blueprint 에서 이 리포를 선택하면 됩니다.
# ⚠️ 조직 보안정책 확인 필수: 업무 사진이 외부 클라우드를 경유합니다. 사내 서버 배포를 권장.
services:
  - type: web
    name: qr-upload-server
    runtime: python
    plan: free                         # 유료 플랜에서만 아래 disk(영구 저장) 사용 가능
    rootDir: .                         # 이 리포 루트가 곧 앱 폴더(qr-upload-server를 그대로 push한 경우)
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BASE_URL                  # 배포 후 https://<앱>.onrender.com 로 채우세요(대시보드에서 입력)
        sync: false
      - key: PRESET_TOKENS             # 고정 토큰 "토큰=이름,토큰=이름" (무료 플랜 필수) — 대시보드에서 입력
        sync: false
      - key: MAX_FILE_MB
        value: "30"
      - key: RETENTION_HOURS
        value: "6"
      - key: CLEANUP_INTERVAL_MIN
        value: "30"
      - key: ALLOWED_EXT
        value: "jpg,jpeg,png,heic,webp"
      - key: REQUIRE_PIN
        value: "false"
      - key: ADMIN_KEY                 # 전체 QR 대시보드(/admin?key=...) 보호키. 자동 생성(강력)
        generateValue: true
      - key: SESSION_SECRET            # 자동 생성(고정) → PIN 세션이 재배포 후에도 유지
        generateValue: true
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: TOKENS_FILE
        value: /data/tokens.json
      - key: QR_DIR
        value: /data/qrcodes
    # ↓ 영구 저장을 원하면(유료) 주석 해제. 없으면 파일시스템은 임시(재배포 시 초기화)입니다.
    #   단, 어차피 RETENTION_HOURS 후 자동 삭제되므로 사진 자체는 임시여도 무방하며,
    #   disk가 없으면 재배포 때 tokens.json 이 사라져 토큰을 다시 발급해야 합니다.
    # disk:
    #   name: data
    #   mountPath: /data
    #   sizeGB: 1
